AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Open WebUI hosting on AWS with CloudFront, WAF, and EC2.
  Deploy this stack in the region where you want the VPC/EC2 (default ap-east-1).
  WAF WebACL is created in us-east-1 via a custom resource (required for CloudFront scope).

# ============================================================================
# Parameters
# ============================================================================
Parameters:
  ResourcePrefix:
    Type: String
    Default: open-webui
    Description: Prefix for all resource names

  AlternateDomainName:
    Type: String
    Description: Alternate domain name (CNAME) for CloudFront distribution
    AllowedPattern: ^[a-zA-Z0-9][a-zA-Z0-9\-\.]*[a-zA-Z0-9]$

  AcmCertificateArn:
    Type: String
    Description: ARN of the ACM certificate in us-east-1 for CloudFront SSL
    AllowedPattern: ^arn:aws:acm:us-east-1:\d{12}:certificate\/[a-f0-9\-]+$

  InstanceType:
    Type: String
    Default: t4g.medium
    Description: EC2 instance type

  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC

  SubnetCidr:
    Type: String
    Default: 10.0.1.0/24
    Description: CIDR block for the public subnet

  AvailabilityZoneSuffix:
    Type: String
    Default: a
    Description: AZ suffix (e.g. a, b, c) appended to the region
    AllowedPattern: ^[a-z]$

  RootVolumeSize:
    Type: Number
    Default: 30
    Description: Root EBS volume size in GB

  DataVolumeSize:
    Type: Number
    Default: 30
    Description: Data EBS volume size in GB (mounted at /mnt/app, retained on stack delete)

  AdminCidr:
    Type: String
    Default: ''
    Description: Optional CIDR for admin access to EC2 (e.g. 1.2.3.4/32). Leave empty to skip.

  EnableNonCoreWAFRules:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
    Description: >-
      Enable non-core WAF managed rules (IP Reputation List, Anonymous IP List).
      Set to false for CloudFront free flat-rate plan compatibility.

# ============================================================================
# Conditions
# ============================================================================
Conditions:
  HasAdminCidr: !Not [!Equals [!Ref AdminCidr, '']]

# ============================================================================
# Mappings - CloudFront managed prefix list IDs per region
# ============================================================================
Mappings:
  CloudFrontPrefixListId:
    ap-east-1:
      PrefixListId: pl-14b2577d
    ap-northeast-1:
      PrefixListId: pl-58a04531
    ap-southeast-1:
      PrefixListId: pl-31a34658
    us-east-1:
      PrefixListId: pl-3b927c52
    us-west-2:
      PrefixListId: pl-82a045eb

# ============================================================================
# Resources
# ============================================================================
Resources:

  # ==========================================================================
  # VPC & Networking (single public subnet)
  # ==========================================================================
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub '${ResourcePrefix}-vpc'

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${ResourcePrefix}-igw'

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref SubnetCidr
      AvailabilityZone: !Sub '${AWS::Region}${AvailabilityZoneSuffix}'
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${ResourcePrefix}-public-subnet'

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${ResourcePrefix}-public-rt'

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  # ==========================================================================
  # Security Group for EC2
  # ==========================================================================
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${ResourcePrefix} EC2 SG - CloudFront + optional admin'
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourcePrefixListId: !FindInMap [CloudFrontPrefixListId, !Ref 'AWS::Region', PrefixListId]
          Description: Allow port 80 from CloudFront
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound
      Tags:
        - Key: Name
          Value: !Sub '${ResourcePrefix}-ec2-sg'

  AdminIngressRule:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: HasAdminCidr
    Properties:
      GroupId: !Ref EC2SecurityGroup
      IpProtocol: '-1'
      CidrIp: !Ref AdminCidr
      Description: Admin access for troubleshooting

  # ==========================================================================
  # S3 Bucket for EC2 scripts
  # ==========================================================================
  ScriptsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      BucketName: !Sub '${ResourcePrefix}-ec2-scripts-${AWS::AccountId}-${AWS::Region}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: !Sub '${ResourcePrefix}-ec2-scripts'

  # ==========================================================================
  # IAM Role & Instance Profile for EC2
  # ==========================================================================
  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ResourcePrefix}-ec2-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub 'arn:${AWS::Partition}:iam::aws:policy/AmazonBedrockLimitedAccess'
        - !Sub 'arn:${AWS::Partition}:iam::aws:policy/AmazonSSMManagedInstanceCore'
      Policies:
        - PolicyName: S3ScriptsRead
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt ScriptsBucket.Arn
                  - !Sub '${ScriptsBucket.Arn}/*'
      Tags:
        - Key: Name
          Value: !Sub '${ResourcePrefix}-ec2-role'

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub '${ResourcePrefix}-ec2-profile'
      Roles:
        - !Ref EC2Role

  # ==========================================================================
  # Data Volume (retained on stack deletion)
  # ==========================================================================
  DataVolume:
    Type: AWS::EC2::Volume
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      AvailabilityZone: !Sub '${AWS::Region}${AvailabilityZoneSuffix}'
      Size: !Ref DataVolumeSize
      VolumeType: gp3
      Encrypted: true
      Tags:
        - Key: Name
          Value: !Sub '${ResourcePrefix}-data-volume'

  DataVolumeAttachment:
    Type: AWS::EC2::VolumeAttachment
    Properties:
      Device: /dev/xvdf
      InstanceId: !Ref EC2Instance
      VolumeId: !Ref DataVolume

  # ==========================================================================
  # EC2 Instance (public subnet, public IP for outbound internet)
  # ==========================================================================
  EC2Instance:
    Type: AWS::EC2::Instance
    DependsOn: PublicRoute
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-arm64}}'
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: !Ref RootVolumeSize
            VolumeType: gp3
            Encrypted: true
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail

          # Wait for data volume
          while [ ! -e /dev/xvdf ] && [ ! -e /dev/nvme1n1 ]; do sleep 1; done
          DATA_DEV=$(readlink -f /dev/xvdf 2>/dev/null || echo /dev/nvme1n1)
          if ! blkid "$DATA_DEV"; then mkfs.xfs "$DATA_DEV"; fi
          mkdir -p /mnt/app
          mount "$DATA_DEV" /mnt/app
          grep -q '/mnt/app' /etc/fstab || echo "$DATA_DEV /mnt/app xfs defaults,nofail 0 2" >> /etc/fstab
          chown ec2-user:ec2-user /mnt/app

          # Install cronie (crontab) - not included in AL2023 by default
          yum install cronie -y
          systemctl enable crond
          systemctl start crond

          # Install Docker
          yum install docker -y
          systemctl enable docker
          systemctl start docker
          usermod -aG docker ec2-user

          # Install docker-compose plugin
          curl -SL "https://github.com/docker/compose/releases/latest/download/docker-compose-linux-$(uname -m)" \
            -o /usr/libexec/docker/cli-plugins/docker-compose
          chmod +x /usr/libexec/docker/cli-plugins/docker-compose
      Tags:
        - Key: Name
          Value: !Sub '${ResourcePrefix}-ec2'

  # ==========================================================================
  # Elastic IP (stable IP across reboots for CloudFront origin)
  # ==========================================================================
  ElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub '${ResourcePrefix}-eip'

  ElasticIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt ElasticIP.AllocationId
      InstanceId: !Ref EC2Instance

  # ==========================================================================
  # WAF WebACL (CLOUDFRONT scope - must be in us-east-1)
  # Created via Lambda custom resource for cross-region support
  # ==========================================================================
  WAFCustomResourceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ResourcePrefix}-waf-cr-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub 'arn:${AWS::Partition}:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
      Policies:
        - PolicyName: WAFv2Management
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - wafv2:CreateWebACL
                  - wafv2:DeleteWebACL
                  - wafv2:UpdateWebACL
                  - wafv2:GetWebACL
                  - wafv2:ListTagsForResource
                  - wafv2:TagResource
                Resource: '*'

  WAFCustomResourceFn:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ResourcePrefix}-waf-cr'
      Runtime: python3.14
      Handler: index.handler
      Timeout: 120
      MemorySize: 256
      Role: !GetAtt WAFCustomResourceRole.Arn
      Code:
        ZipFile: |
          import boto3, json, traceback, urllib.request
          def send(event, context, status, data=None, pid=None):
            body = json.dumps({'Status': status,
              'Reason': f'See CloudWatch: {context.log_stream_name}',
              'PhysicalResourceId': pid or context.log_stream_name,
              'StackId': event['StackId'], 'RequestId': event['RequestId'],
              'LogicalResourceId': event['LogicalResourceId'],
              'Data': data or {}}).encode()
            urllib.request.urlopen(urllib.request.Request(
              event['ResponseURL'], data=body,
              headers={'Content-Type': ''}, method='PUT'))
          def handler(event, context):
            try:
              props = event['ResourceProperties']
              waf = boto3.client('wafv2', region_name='us-east-1')
              name = props['WebACLName']
              rules = json.loads(props['Rules'])
              if props.get('EnableNonCoreRules', 'false') == 'true':
                rules.extend(json.loads(props.get('NonCoreRules', '[]')))
              if event['RequestType'] == 'Create':
                r = waf.create_web_acl(
                  Name=name, Scope='CLOUDFRONT',
                  DefaultAction={'Allow': {}},
                  VisibilityConfig={'SampledRequestsEnabled': True,
                    'CloudWatchMetricsEnabled': True,
                    'MetricName': name + '-metric'},
                  Rules=rules,
                  Tags=[{'Key':'Name','Value':name}])
                arn = r['Summary']['ARN']
                send(event, context, 'SUCCESS', {'Arn': arn}, arn)
              elif event['RequestType'] == 'Update':
                arn = event['PhysicalResourceId']
                acl = waf.get_web_acl(Name=name, Scope='CLOUDFRONT',
                  Id=arn.split('/')[-1])
                waf.update_web_acl(
                  Name=name, Scope='CLOUDFRONT', Id=arn.split('/')[-1],
                  LockToken=acl['LockToken'],
                  DefaultAction={'Allow': {}},
                  VisibilityConfig={'SampledRequestsEnabled': True,
                    'CloudWatchMetricsEnabled': True,
                    'MetricName': name + '-metric'},
                  Rules=rules)
                send(event, context, 'SUCCESS', {'Arn': arn}, arn)
              elif event['RequestType'] == 'Delete':
                arn = event['PhysicalResourceId']
                if arn and '/' in arn:
                  try:
                    acl = waf.get_web_acl(Name=name, Scope='CLOUDFRONT',
                      Id=arn.split('/')[-1])
                    waf.delete_web_acl(Name=name, Scope='CLOUDFRONT',
                      Id=arn.split('/')[-1], LockToken=acl['LockToken'])
                  except waf.exceptions.WAFNonexistentItemException:
                    pass
                send(event, context, 'SUCCESS')
            except Exception as e:
              traceback.print_exc()
              send(event, context, 'FAILED', {'Error': str(e)})

  WAFWebACL:
    Type: Custom::WAFWebACL
    Properties:
      ServiceToken: !GetAtt WAFCustomResourceFn.Arn
      WebACLName: !Sub '${ResourcePrefix}-waf'
      EnableNonCoreRules: !Ref EnableNonCoreWAFRules
      Rules: !Sub |
        [
          {
            "Name": "AWSManagedRulesCommonRuleSet",
            "Priority": 1,
            "OverrideAction": {"None": {}},
            "Statement": {
              "ManagedRuleGroupStatement": {
                "VendorName": "AWS",
                "Name": "AWSManagedRulesCommonRuleSet",
                "ExcludedRules": [{"Name": "SizeRestrictions_BODY"}]
              }
            },
            "VisibilityConfig": {
              "SampledRequestsEnabled": true,
              "CloudWatchMetricsEnabled": true,
              "MetricName": "${ResourcePrefix}-core-rule-set"
            }
          },
          {
            "Name": "RateLimitPerIP",
            "Priority": 2,
            "Action": {"Block": {}},
            "Statement": {
              "RateBasedStatement": {
                "Limit": 30000,
                "EvaluationWindowSec": 300,
                "AggregateKeyType": "IP"
              }
            },
            "VisibilityConfig": {
              "SampledRequestsEnabled": true,
              "CloudWatchMetricsEnabled": true,
              "MetricName": "${ResourcePrefix}-rate-limit"
            }
          }
        ]
      NonCoreRules: !Sub |
        [
          {
            "Name": "AWSManagedRulesAmazonIpReputationList",
            "Priority": 10,
            "OverrideAction": {"None": {}},
            "Statement": {
              "ManagedRuleGroupStatement": {
                "VendorName": "AWS",
                "Name": "AWSManagedRulesAmazonIpReputationList"
              }
            },
            "VisibilityConfig": {
              "SampledRequestsEnabled": true,
              "CloudWatchMetricsEnabled": true,
              "MetricName": "${ResourcePrefix}-ip-reputation"
            }
          },
          {
            "Name": "AWSManagedRulesAnonymousIpList",
            "Priority": 11,
            "OverrideAction": {"None": {}},
            "Statement": {
              "ManagedRuleGroupStatement": {
                "VendorName": "AWS",
                "Name": "AWSManagedRulesAnonymousIpList"
              }
            },
            "VisibilityConfig": {
              "SampledRequestsEnabled": true,
              "CloudWatchMetricsEnabled": true,
              "MetricName": "${ResourcePrefix}-anonymous-ip"
            }
          }
        ]

  # ==========================================================================
  # CloudFront Distribution
  # ==========================================================================
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    DependsOn: ElasticIPAssociation
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub '${ResourcePrefix} distribution'
        PriceClass: PriceClass_All
        Aliases:
          - !Ref AlternateDomainName
        ViewerCertificate:
          AcmCertificateArn: !Ref AcmCertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        WebACLId: !GetAtt WAFWebACL.Arn
        HttpVersion: http2and3
        IPV6Enabled: true
        DefaultCacheBehavior:
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
            - PUT
            - POST
            - PATCH
            - DELETE
          CachedMethods:
            - GET
            - HEAD
          # CachingDisabled managed cache policy
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
          # AllViewer managed origin request policy
          OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3
          TargetOriginId: !Sub '${ResourcePrefix}-origin'
          Compress: true
        Origins:
          - Id: !Sub '${ResourcePrefix}-origin'
            DomainName: !GetAtt EC2Instance.PublicDnsName
            CustomOriginConfig:
              HTTPPort: 80
              HTTPSPort: 443
              OriginProtocolPolicy: http-only
              OriginReadTimeout: 60
              OriginKeepaliveTimeout: 30
      Tags:
        - Key: Name
          Value: !Sub '${ResourcePrefix}-distribution'

# ============================================================================
# Outputs
# ============================================================================
Outputs:
  CloudFrontDomainName:
    Description: CloudFront domain name - point your DNS CNAME here
    Value: !GetAtt CloudFrontDistribution.DomainName

  CloudFrontDistributionId:
    Description: CloudFront distribution ID
    Value: !Ref CloudFrontDistribution

  EC2InstanceId:
    Description: EC2 instance ID (connect via SSM Session Manager)
    Value: !Ref EC2Instance

  EC2PublicIp:
    Description: EC2 Elastic IP address (stable across reboots)
    Value: !Ref ElasticIP

  VpcId:
    Description: VPC ID
    Value: !Ref VPC

  WAFWebACLArn:
    Description: WAF Web ACL ARN (in us-east-1)
    Value: !GetAtt WAFWebACL.Arn

  ScriptsBucketName:
    Description: S3 bucket for EC2 scripts
    Value: !Ref ScriptsBucket
